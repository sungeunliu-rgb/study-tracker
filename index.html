<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 공부</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sky: #eef6ff;
  --mint: #e6f7f2;
  --peach: #fff0ea;
  --lavender: #f0eeff;
  --text: #3a3a4a;
  --text-soft: #7a7a8c;
  --text-muted: #aaa;
  --card-bg: #ffffff;
  --border: #e8e8f0;
  --accent-a: #5baadc;
  --accent-a-mid: #3d90c4;
  --accent-a-light: #ddf0fc;
  --accent-b: #f4845f;
  --accent-b-mid: #e06840;
  --accent-b-light: #fde8df;
  --radius-lg: 16px;
  --radius-md: 10px;
  --radius-sm: 6px;
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: linear-gradient(160deg, #fdf6ff 0%, #eef8ff 50%, #fff8f0 100%);
  min-height: 100vh;
  color: var(--text);
}

/* ── header ── */
.app-header {
  padding: 2rem 2rem 1rem;
  text-align: center;
}

.header-deco {
  font-size: 28px;
  margin-bottom: 4px;
  letter-spacing: 4px;
}

.app-title {
  font-family: 'Gaegu', cursive;
  font-size: 30px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.5px;
  line-height: 1.2;
}

.app-tagline {
  font-family: 'Gaegu', cursive;
  font-size: 15px;
  color: var(--text-soft);
  margin-top: 2px;
}

/* ── tabs ── */
.tabs-wrap {
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: 1.2rem 2rem 0;
}

.tab-btn {
  font-family: 'Gaegu', cursive;
  font-size: 17px;
  font-weight: 700;
  padding: 10px 28px;
  border: 2px solid transparent;
  border-radius: 40px;
  cursor: pointer;
  background: white;
  color: var(--text-soft);
  transition: all 0.18s;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.tab-btn .tab-emoji { font-size: 18px; }

.tab-btn.active-a {
  background: var(--accent-a-light);
  border-color: var(--accent-a);
  color: var(--accent-a-mid);
}

.tab-btn.active-b {
  background: var(--accent-b-light);
  border-color: var(--accent-b);
  color: var(--accent-b-mid);
}

.tab-btn .badge {
  font-size: 11px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 500;
  padding: 1px 7px;
  border-radius: 12px;
  background: rgba(0,0,0,0.07);
  color: inherit;
}

/* ── content ── */
.content { display: none; padding: 1.5rem 2rem 3rem; max-width: 780px; margin: 0 auto; }
.content.active { display: block; }

/* ── form card ── */
.form-card {
  background: white;
  border-radius: var(--radius-lg);
  padding: 1.6rem;
  margin-bottom: 1.8rem;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  border: 1.5px solid var(--border);
}

.form-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 1.2rem;
  padding-bottom: 1rem;
  border-bottom: 1.5px dashed var(--border);
}

.form-card-header .header-emoji { font-size: 22px; }

.child-name-display {
  font-family: 'Gaegu', cursive;
  font-size: 20px;
  font-weight: 700;
}

.name-edit-input {
  font-family: 'Gaegu', cursive;
  font-size: 18px;
  font-weight: 700;
  border: none;
  border-bottom: 2px dashed var(--border);
  background: transparent;
  outline: none;
  color: var(--text);
  max-width: 120px;
  padding: 2px 4px;
}

.name-edit-input:focus { border-bottom-color: var(--accent-a); }

.form-section-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 0.7rem;
}

.form-row { display: grid; grid-template-columns: 130px 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }

.field-group { display: flex; flex-direction: column; gap: 4px; }

label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}

input, select, textarea {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  padding: 8px 11px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  background: #fafafa;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, background 0.15s;
  width: 100%;
}

input:focus, select:focus, textarea:focus {
  background: white;
  border-color: #aac4e0;
}

textarea { resize: vertical; min-height: 58px; line-height: 1.6; }

.btn-submit {
  font-family: 'Gaegu', cursive;
  font-size: 17px;
  font-weight: 700;
  padding: 10px 28px;
  border: none;
  border-radius: 40px;
  cursor: pointer;
  transition: transform 0.12s, box-shadow 0.12s;
  box-shadow: 0 3px 12px rgba(0,0,0,0.12);
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
}

.btn-submit:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(0,0,0,0.16); }
.btn-submit:active { transform: scale(0.97); }
.btn-a { background: var(--accent-a); color: white; }
.btn-b { background: var(--accent-b); color: white; }

/* ── list area ── */
.list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.8rem;
}

.list-title {
  font-family: 'Gaegu', cursive;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
}

.filter-select {
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 20px;
  width: auto;
}

.stats-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-bottom: 1rem;
}

.stat-chip {
  font-size: 12px;
  padding: 4px 12px;
  border-radius: 20px;
  background: white;
  border: 1.5px solid var(--border);
  color: var(--text-soft);
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}

.stat-chip strong { font-weight: 500; color: var(--text); }

/* ── workbook groups ── */
.log-list { display: flex; flex-direction: column; gap: 14px; }

.wb-group {
  background: white;
  border-radius: var(--radius-lg);
  border: 1.5px solid var(--border);
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  overflow: hidden;
}

.wb-group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: #f7f7fc;
  border-bottom: 1.5px solid var(--border);
  cursor: pointer;
  user-select: none;
}

.wb-group-header:hover { background: #efeff8; }

.wb-group-left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.wb-group-title {
  font-family: 'Gaegu', cursive;
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
}

.wb-count-chip {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 9px;
  border-radius: 20px;
  background: var(--border);
  color: var(--text-soft);
}

.wb-toggle-icon {
  font-size: 13px;
  color: var(--text-muted);
  transition: transform 0.2s;
  display: inline-block;
}

.wb-toggle-icon.collapsed { transform: rotate(-90deg); }

.wb-entries { display: flex; flex-direction: column; }

/* ── log items ── */
.log-item {
  background: white;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: grid;
  grid-template-columns: 86px auto 1fr auto;
  gap: 10px;
  align-items: start;
  transition: background 0.1s;
}

.log-item:last-child { border-bottom: none; }

.log-date {
  font-size: 12px;
  color: var(--text-muted);
  padding-top: 2px;
  white-space: nowrap;
  line-height: 1.4;
}

.log-day {
  display: block;
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 1px;
}

.subject-badge {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 20px;
  white-space: nowrap;
  align-self: start;
  margin-top: 1px;
}

.badge-a { background: var(--accent-a-light); color: var(--accent-a-mid); }
.badge-b { background: var(--accent-b-light); color: var(--accent-b-mid); }

.log-body { }

.log-workbook {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 2px;
}

.log-pages {
  font-size: 12px;
  color: var(--text-soft);
}

.log-memo {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 5px;
  line-height: 1.55;
  white-space: pre-wrap;
  padding: 5px 9px;
  background: #f9f9fc;
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--border);
}

.btn-delete {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 16px;
  color: var(--border);
  padding: 2px 4px;
  line-height: 1;
  transition: color 0.15s;
  border-radius: 50%;
  align-self: start;
}

.btn-delete:hover { color: #e07070; background: #fff0f0; }

.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-muted);
  font-family: 'Gaegu', cursive;
  font-size: 18px;
  background: white;
  border-radius: var(--radius-lg);
  border: 2px dashed var(--border);
}

.empty-state .empty-emoji { font-size: 36px; display: block; margin-bottom: 8px; }

@media (max-width: 580px) {
  .form-row { grid-template-columns: 1fr 1fr; }
  .form-row > :first-child { grid-column: 1 / -1; }
  .log-item { grid-template-columns: 76px 1fr auto; grid-template-rows: auto auto; }
  .log-item .subject-badge { grid-row: 2; }
  .log-body { grid-column: 2 / 4; grid-row: 1; }
  .content { padding: 1rem 1rem 3rem; }
}
</style>
</head>
<body>

<div class="app-header">
  <div class="header-deco">⭐ 📖 ✏️</div>
  <div class="app-title">오늘의 공부 기록장</div>
  <div class="app-tagline">매일매일 차곡차곡 쌓이는 우리 아이 기록 🌱</div>
</div>

<div class="tabs-wrap">
  <button class="tab-btn active-a" id="tab-0" onclick="switchTab(0)">
    <span class="tab-emoji">🌟</span>
    <span class="tab-name-display" id="tab-name-0">첫째</span>
    <span class="badge" id="tab-count-0"></span>
  </button>
  <button class="tab-btn" id="tab-1" onclick="switchTab(1)">
    <span class="tab-emoji">🌈</span>
    <span class="tab-name-display" id="tab-name-1">둘째</span>
    <span class="badge" id="tab-count-1"></span>
  </button>
</div>

<!-- child 0 -->
<div id="content-0" class="content active">
  <div class="form-card">
    <div class="form-card-header">
      <span class="header-emoji">✏️</span>
      <span class="card-header-title" id="card-header-0" style="font-family:'Gaegu',cursive;font-size:20px;font-weight:700;color:var(--text)">우현이의 공부 기록</span>
    </div>
    <div class="form-section-label">새 기록 추가</div>
    <div class="form-row">
      <div class="field-group">
        <label>날짜</label>
        <input type="date" id="date-0">
      </div>
      <div class="field-group">
        <label>과목</label>
        <select id="subject-0">
          <option value="">선택 안 함</option>
          <option>국어</option><option>수학</option><option>영어</option>
          <option>사회</option><option>과학</option><option>한국사</option><option>기타</option>
        </select>
      </div>
      <div class="field-group">
        <label>문제집</label>
        <input type="text" id="workbook-0" placeholder="예: 최상위S 3-2" list="wb-list-0" autocomplete="off">
        <datalist id="wb-list-0"></datalist>
      </div>
    </div>
    <div class="form-row-2">
      <div class="field-group">
        <label>페이지 / 범위</label>
        <input type="text" id="pages-0" placeholder="예: p.24–28">
      </div>
      <div class="field-group">
        <label>메모</label>
        <input type="text" id="memo-0" placeholder="틀린 문제, 특이사항 등">
      </div>
    </div>
    <button class="btn-submit btn-a" onclick="addEntry(0)">
      <span>+ 기록하기</span>
    </button>
  </div>

  <div class="list-header">
    <span class="list-title">📋 지금까지의 기록</span>
    <select class="filter-select" id="filter-subject-0" onchange="renderList(0)">
      <option value="">전체 과목</option>
      <option>국어</option><option>수학</option><option>영어</option>
      <option>사회</option><option>과학</option><option>한국사</option><option>기타</option>
    </select>
  </div>
  <div class="stats-bar" id="stats-0"></div>
  <div class="log-list" id="list-0"></div>
</div>

<!-- child 1 -->
<div id="content-1" class="content">
  <div class="form-card">
    <div class="form-card-header">
      <span class="header-emoji">✏️</span>
      <span class="card-header-title" id="card-header-1" style="font-family:'Gaegu',cursive;font-size:20px;font-weight:700;color:var(--text)">수현이의 공부 기록</span>
    </div>
    <div class="form-section-label">새 기록 추가</div>
    <div class="form-row">
      <div class="field-group">
        <label>날짜</label>
        <input type="date" id="date-1">
      </div>
      <div class="field-group">
        <label>과목</label>
        <select id="subject-1">
          <option value="">선택 안 함</option>
          <option>국어</option><option>수학</option><option>영어</option>
          <option>사회</option><option>과학</option><option>한국사</option><option>기타</option>
        </select>
      </div>
      <div class="field-group">
        <label>문제집</label>
        <input type="text" id="workbook-1" placeholder="예: 완자 공부력 3A" list="wb-list-1" autocomplete="off">
        <datalist id="wb-list-1"></datalist>
      </div>
    </div>
    <div class="form-row-2">
      <div class="field-group">
        <label>페이지 / 범위</label>
        <input type="text" id="pages-1" placeholder="예: p.24–28">
      </div>
      <div class="field-group">
        <label>메모</label>
        <input type="text" id="memo-1" placeholder="틀린 문제, 특이사항 등">
      </div>
    </div>
    <button class="btn-submit btn-b" onclick="addEntry(1)">
      <span>+ 기록하기</span>
    </button>
  </div>

  <div class="list-header">
    <span class="list-title">📋 지금까지의 기록</span>
    <select class="filter-select" id="filter-subject-1" onchange="renderList(1)">
      <option value="">전체 과목</option>
      <option>국어</option><option>수학</option><option>영어</option>
      <option>사회</option><option>과학</option><option>한국사</option><option>기타</option>
    </select>
  </div>
  <div class="stats-bar" id="stats-1"></div>
  <div class="log-list" id="list-1"></div>
</div>

<script>
const STORAGE_KEY = 'study_tracker_v2';
const DAYS = ['일','월','화','수','목','금','토'];
const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbxxhN_cIsqxZJKk-vpYVfv7wlOGs7tjMi9SqyR0wCXjXTwsy7M5PUKqHsFr30kmkPoM/exec';

function sendToSheet(name, entry) {
  if (!WEBHOOK_URL) return;
  const params = new URLSearchParams({
    name,
    date: entry.date,
    subject: entry.subject || '',
    workbook: entry.workbook,
    pages: entry.pages || '',
    memo: entry.memo || ''
  });
  fetch(`${WEBHOOK_URL}?${params.toString()}`)
    .then(r => r.json())
    .then(d => { if (d.result !== 'ok') console.warn('시트 저장 실패:', d); })
    .catch(err => console.warn('시트 전송 오류:', err));
}

let state = { names: ['우현', '수현'], entries: [[], []] };

function load() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) state = JSON.parse(s); } catch(e) {}
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function today() { return new Date().toISOString().slice(0,10); }

function formatDate(str) {
  if (!str) return '';
  const [y,m,d] = str.split('-');
  const dt = new Date(str);
  const day = DAYS[dt.getDay()];
  return { main: `${y.slice(2)}.${m}.${d}`, day };
}

function switchTab(idx) {
  ['tab-0','tab-1'].forEach((id,i) => {
    const btn = document.getElementById(id);
    btn.className = 'tab-btn';
    if (i === idx) btn.classList.add(i === 0 ? 'active-a' : 'active-b');
  });
  document.querySelectorAll('.content').forEach((c,i) => c.classList.toggle('active', i === idx));
}

function nameWithSuffix(name) {
  if (!name) return '';
  const last = name[name.length - 1];
  const code = last.charCodeAt(0);
  if (code < 0xAC00 || code > 0xD7A3) return name + '의';
  const jongseong = (code - 0xAC00) % 28;
  return name + (jongseong === 0 ? '의' : '이의');
}

function updateCardHeader(idx) {
  const el = document.getElementById(`card-header-${idx}`);
  if (!el) return;
  const name = state.names[idx];
  el.textContent = nameWithSuffix(name) + ' 공부 기록';
}

function updateWorkbookList(idx) {
  const list = document.getElementById(`wb-list-${idx}`);
  if (!list) return;
  const names = [...new Set(state.entries[idx].map(e => e.workbook).filter(Boolean))];
  list.innerHTML = names.map(n => `<option value="${n}">`).join('');
}

function updateChildName(idx) {
  const input = document.getElementById(`name-${idx}`);
  const val = input ? input.value.trim() : '';
  const def = idx === 0 ? '우현' : '수현';
  state.names[idx] = val || def;
  document.getElementById(`tab-name-${idx}`).textContent = state.names[idx];
  updateCardHeader(idx);
  save();
}

function addEntry(idx) {
  const date = document.getElementById(`date-${idx}`).value;
  const subject = document.getElementById(`subject-${idx}`).value;
  const workbook = document.getElementById(`workbook-${idx}`).value.trim();
  const pages = document.getElementById(`pages-${idx}`).value.trim();
  const memo = document.getElementById(`memo-${idx}`).value.trim();

  if (!date || !workbook) { alert('날짜와 문제집은 꼭 입력해 주세요 😊'); return; }

  const entry = { id: Date.now(), date, subject, workbook, pages, memo };
  state.entries[idx].unshift(entry);
  save();
  sendToSheet(state.names[idx], entry);
  updateWorkbookList(idx);
  renderList(idx);
  updateTabCount(idx);

  ['subject','workbook','pages','memo'].forEach(f => {
    const el = document.getElementById(`${f}-${idx}`);
    if (el.tagName === 'SELECT') el.value = '';
    else el.value = '';
  });
}

function deleteEntry(idx, id) {
  if (!confirm('이 기록을 삭제할까요?')) return;
  state.entries[idx] = state.entries[idx].filter(e => e.id !== id);
  save();
  updateWorkbookList(idx);
  renderList(idx);
  updateTabCount(idx);
}

function updateTabCount(idx) {
  const n = state.entries[idx].length;
  const el = document.getElementById(`tab-count-${idx}`);
  el.textContent = n > 0 ? `${n}건` : '';
  el.style.display = n > 0 ? '' : 'none';
}

function renderList(idx) {
  const filter = document.getElementById(`filter-subject-${idx}`).value;
  let entries = state.entries[idx];
  if (filter) entries = entries.filter(e => e.subject === filter);

  const bc = idx === 0 ? 'badge-a' : 'badge-b';
  const listEl = document.getElementById(`list-${idx}`);
  const statsEl = document.getElementById(`stats-${idx}`);

  if (entries.length === 0) {
    listEl.innerHTML = `<div class="empty-state"><span class="empty-emoji">📚</span>아직 기록이 없어요!<br>첫 기록을 남겨볼까요?</div>`;
    statsEl.innerHTML = '';
    return;
  }

  const total = entries.length;
  const subjects = [...new Set(entries.map(e => e.subject).filter(Boolean))];
  const workbookNames = [...new Set(entries.map(e => e.workbook))];

  statsEl.innerHTML = `
    <div class="stat-chip">총 <strong>${total}건</strong></div>
    ${subjects.length ? `<div class="stat-chip">${subjects.join(' · ')}</div>` : ''}
    <div class="stat-chip">문제집 <strong>${workbookNames.length}권</strong></div>
  `;

  const grouped = {};
  entries.forEach(e => {
    if (!grouped[e.workbook]) grouped[e.workbook] = [];
    grouped[e.workbook].push(e);
  });

  Object.values(grouped).forEach(g => g.sort((a,b) => b.date.localeCompare(a.date)));

  const wbOrder = Object.keys(grouped).sort((a,b) => {
    const latestA = grouped[a][0].date;
    const latestB = grouped[b][0].date;
    return latestB.localeCompare(latestA);
  });

  listEl.innerHTML = wbOrder.map((wb, wi) => {
    const group = grouped[wb];
    const groupId = `wb-group-${idx}-${wi}`;

    const subjectCount = {};
    group.forEach(e => { if (e.subject) subjectCount[e.subject] = (subjectCount[e.subject] || 0) + 1; });
    const topSubject = Object.keys(subjectCount).sort((a,b) => subjectCount[b] - subjectCount[a])[0] || '';
    const bookEmoji = { '국어': '📘', '수학': '📙', '영어': '📒', '사회': '📕', '과학': '📗', '한국사': '📔', '기타': '📓' };
    const emoji = bookEmoji[topSubject] || '📚';

    const rows = group.map(e => {
      const fd = formatDate(e.date);
      return `
      <div class="log-item">
        <div class="log-date">
          ${fd.main}
          <span class="log-day">${fd.day}요일</span>
        </div>
        <div>
          ${e.subject ? `<span class="subject-badge ${bc}">${e.subject}</span>` : ''}
        </div>
        <div class="log-body">
          ${e.pages ? `<div class="log-pages">📄 ${e.pages}</div>` : ''}
          ${e.memo ? `<div class="log-memo">💬 ${e.memo}</div>` : ''}
        </div>
        <button class="btn-delete" onclick="deleteEntry(${idx}, ${e.id})" title="삭제">✕</button>
      </div>`;
    }).join('');

    return `
    <div class="wb-group">
      <div class="wb-group-header" onclick="toggleGroup('${groupId}')">
        <div class="wb-group-left">
          <span class="wb-group-title">${emoji} ${wb}</span>
          <span class="wb-count-chip">${group.length}회</span>
        </div>
        <span class="wb-toggle-icon" id="icon-${groupId}">▼</span>
      </div>
      <div class="wb-entries" id="${groupId}">${rows}</div>
    </div>`;
  }).join('');
}

function toggleGroup(groupId) {
  const el = document.getElementById(groupId);
  const icon = document.getElementById(`icon-${groupId}`);
  const isHidden = el.style.display === 'none';
  el.style.display = isHidden ? 'flex' : 'none';
  icon.classList.toggle('collapsed', !isHidden);
}

function init() {
  load();
  for (let i = 0; i < 2; i++) {
    document.getElementById(`date-${i}`).value = today();
    const saved = state.names[i];
    const def = i === 0 ? '우현' : '수현';
    const nameEl = document.getElementById(`name-${i}`);
    if (nameEl) nameEl.value = (saved && saved !== def) ? saved : '';
    document.getElementById(`tab-name-${i}`).textContent = saved || def;
    updateCardHeader(i);
    updateWorkbookList(i);
    updateTabCount(i);
    renderList(i);
  }
}

init();
</script>
</body>
</html>
